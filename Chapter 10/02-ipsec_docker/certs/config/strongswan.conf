charon {
  load_modular = yes
  plugins {
    include strongswan.d/charon/*.conf
    # Explicitly ensure sha2 is loaded for the IKE daemon
    sha2 {
      load = yes
    }
  }
}
libstrongswan {
  plugins {
    include strongswan.d/*.conf
    # Explicitly ensure sha2 is loaded for the library functions
    sha2 {
      load = yes
    }
  }
}

